name: gcn-reid
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch and CUDA (adjust based on your system)
  # For CUDA 11.8:
  - pytorch>=2.1.0
  - torchvision>=0.16.0
  - pytorch-cuda=11.8
  
  # For CPU only, use:
  # - pytorch>=2.1.0
  # - torchvision>=0.16.0
  # - cpuonly

  # Core Scientific Computing
  - numpy>=1.21.0
  - scipy>=1.7.0
  - scikit-learn>=1.0.0
  - pandas>=1.3.0

  # Image Processing
  - pillow>=8.3.0
  - opencv>=4.5.0

  # Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  - tensorboard>=2.7.0

  # Configuration
  - pyyaml>=5.4.0
  
  # Progress Bars
  - tqdm>=4.62.0

  # Graph Processing
  - networkx>=2.6.0

  # XML Parsing
  - lxml>=4.6.0

  # System Monitoring
  - psutil>=5.8.0

  # Jupyter Support
  - jupyter>=1.0.0
  - ipykernel>=6.0.0
  - plotly>=5.0.0

  # Development Tools
  - pytest>=6.2.0
  - black>=21.0.0
  - flake8>=3.9.0
  - isort>=5.9.0

  # pip dependencies (not available in conda)
  - pip
  - pip:
    # PyTorch Geometric (install after PyTorch)
    - torch-geometric>=2.0.0
    - torch-scatter
    - torch-sparse
    - torch-cluster
    - torch-spline-conv
    
    # Transformers and LoRA
    - transformers>=4.30.0
    - peft>=0.4.0
    
    # Experiment Tracking
    - wandb>=0.12.0
    
    # Efficient Search
    - faiss-cpu>=1.7.0
    
    # Pretrained Models
    - timm>=0.6.0
    
    # XML Processing
    - xmltodict>=0.12.0
    
    # GPU Monitoring
    - gpustat>=1.0.0

variables:
  CUDA_VISIBLE_DEVICES: "0"
  OMP_NUM_THREADS: "4"
  MKL_NUM_THREADS: "4"
