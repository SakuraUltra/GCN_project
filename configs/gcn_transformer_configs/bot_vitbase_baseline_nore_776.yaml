# ============================================================
# ViT-Base/21k Baseline 配置文件（不带 GCN，无 Random Erasing）
# 用于 VIT-33 任务：训练纯 ViT baseline（无RE消融实验）
# 对比 VIT-10（有RE）以量化 Random Erasing 对 ViT 的贡献
# ============================================================

# Data Configuration
DATA:
  ROOT: "data/dataset/776_DataSet"
  BATCH_SIZE: 64  # P * K = 16 * 4 = 64
  NUM_WORKERS: 24
  
  # PK Sampler for Triplet Loss
  USE_PK_SAMPLER: true
  P: 16  # Number of identities per batch
  K: 4   # Number of instances per identity

# Model Configuration
MODEL:
  NAME: "BotGCN"

  # ── Backbone ──────────────────────────────────────────────
  BACKBONE:
    TYPE: "vit"
    NAME: "vit_base_patch16_224.augreg_in21k_ft_in1k"  # ViT-Base/21k model
    PRETRAINED: true
    OUT_CHANNELS: 2048
    TARGET_SPATIAL: 8

  # ── GCN（关闭）─────────────────────────────────────────────
  GCN:
    USE_GCN: false  # ⚠️ 关闭 GCN，训练纯 ViT baseline
    GRID_H: 4
    GRID_W: 4
    IN_CHANNELS: 2048
    HIDDEN_CHANNELS: 512
    OUT_CHANNELS: 2048
    NUM_LAYERS: 1
    DROPOUT: 0.5
    POOLING_TYPE: "mean"

  # ── 融合（不使用）──────────────────────────────────────────
  FUSION:
    TYPE: "concat"
    CLS_FUSION: false  # 不使用 CLS fusion（因为没有 GCN）
    OUT_DIM: 2048

  # ── 分类头 ───────────────────────────────────────────────
  NUM_CLASSES: 576  # VeRi-776 training identities

  # BNNeck
  NECK: "bnneck"

# Input Configuration
INPUT:
  SIZE_TRAIN: [224, 224]  # ViT 标准输入
  SIZE_TEST: [224, 224]
  PIXEL_MEAN: [0.485, 0.456, 0.406]
  PIXEL_STD: [0.229, 0.224, 0.225]

# Dataloader Configuration
DATALOADER:
  SAMPLER: "pk"
  NUM_INSTANCE: 4
  BATCH_SIZE: 64

# Optimizer Configuration
OPTIMIZER:
  NAME: "AdamW"
  BASE_LR: 0.000035  # 3.5e-5 for ViT backbone
  WEIGHT_DECAY: 0.0005
  EPS: !!float 1e-8

  # ViT backbone 与新增层分组学习率
  LR_GROUPS:
    vit_backbone: 1.0      # backbone lr = BASE_LR × 1.0
    patch_proj: 10.0       # 新增投影层 lr × 10
    cls_proj: 10.0

# Scheduler Configuration
SCHEDULER:
  NAME: "WarmupCosineAnnealingLR"
  WARMUP_ITERS: 500
  WARMUP_EPOCHS: 10
  
# Loss Configuration
LOSS:
  LABEL_SMOOTH: 0.1
  TRIPLET_MARGIN: 0.3
  ID_LOSS_WEIGHT: 1.0
  TRIPLET_LOSS_WEIGHT: 1.0

# Augmentation Configuration (VIT-33: Random Erasing DISABLED)
AUGMENTATION:
  RANDOM_ERASING: false
  RANDOM_ERASING_PROB: 0.0  # ⚠️ 关闭 RE 用于消融实验

# Training Configuration
EPOCHS: 120
MAX_EPOCHS: 120
EVAL_PERIOD: 10
LOG_PERIOD: 50

# Test Configuration
TEST:
  DATASET: "veri776"
  EVAL_PERIOD: 10

# AMP (Automatic Mixed Precision)
USE_AMP: false

# Output Configuration
OUTPUT_DIR: "outputs/bot_vitbase_baseline_nore_776"
SEED: 42

# 备注 (VIT-33):
# 1. 纯 ViT baseline，不使用 GCN
# 2. 只用 CLS token 作为全局特征
# 3. 参数量约 88M（ViT-Base 86M + 投影层 2M）
# 4. ⚠️ Random Erasing 关闭（消融实验）
# 5. 对比 VIT-10（有RE，74.21%）量化 RE 对 ViT 的贡献
# 6. 对比 ResNet baseline（无RE，68.69%）评估 ViT 架构优势
