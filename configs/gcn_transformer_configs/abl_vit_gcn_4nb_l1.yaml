# ============================================================
# abl_vit_gcn_4nb_l1.yaml
# ABL-02 (ViT reference) / ABL-10 (depth=1) / ABL-14 (edge=4nb)
# ViT-Base Native768 + GCN, Edge=4-neighbor, Layers=1
# ============================================================

DATA:
  ROOT: "data/dataset/776_DataSet"
  BATCH_SIZE: 64
  NUM_WORKERS: 8
  USE_PK_SAMPLER: true
  P: 16
  K: 4
  AUGMENTATION:
    TYPE: "random_erasing"
    PROBABILITY: 0.5
    PARAMS:
      sl: 0.02
      sh: 0.2
      r1: 0.3
      r2: 3.33
      mode: "random"

INPUT:
  SIZE_TRAIN: [224, 224]        # ViT requires 224x224
  SIZE_TEST: [224, 224]

MODEL:
  NAME: "BoTGCN"
  BACKBONE:                     # 字典格式 → 训练脚本识别为 ViT
    TYPE: "vit_native"
    NAME: "vit_base_patch16_224.augreg_in21k_ft_in1k"
    PRETRAINED: true
    NATIVE_DIM: true            # 使用原生768维，不升维到2048
  NUM_CLASSES: 576
  FEATURE_DIM: 768              # ViT-Base native 维度
  LAST_STRIDE: 1

  GCN:
    USE_GCN: true
    GRID_H: 4
    GRID_W: 4
    ADJACENCY_TYPE: "4"         # 4-neighbor 固定空间拓扑
    HIDDEN_CHANNELS: 512
    OUT_CHANNELS: null          # null = 自动使用 backbone 输出维度(768)
    NUM_LAYERS: 1
    DROPOUT: 0.5
    KNN_K: 8
    KNN_METRIC: "cosine"
    KNN_DETACH: true
    GNN_TYPE: "gcn"
    POOLING_TYPE: "mean"
    POOLING_HIDDEN_DIM: 128

  FUSION:
    TYPE: "concat"
    HIDDEN_DIM: 512
    DROPOUT: 0.5

OPTIMIZER:
  NAME: "AdamW"
  BASE_LR: 0.000035             # ViT 用更小的学习率（ResNet的1/10）
  WEIGHT_DECAY: 0.0001
  EPS: !!float 1e-8
  LR_GROUPS:
    vit_backbone: 1.0
    cls_norm: 10.0
    gcn: 10.0
    cls_fusion: 10.0

SCHEDULER:
  NAME: "WarmupCosineAnnealingLR"
  WARMUP_EPOCHS: 10

LOSS:
  LABEL_SMOOTH: 0.1
  TRIPLET_MARGIN: 0.3
  ID_LOSS_WEIGHT: 1.0
  TRIPLET_LOSS_WEIGHT: 1.0

EPOCHS: 120
EVAL_PERIOD: 10
LOG_PERIOD: 50

AUGMENTATION:
  RANDOM_ERASING: true
  RANDOM_ERASING_PROB: 0.5

USE_AMP: false
OUTPUT:
  DIR: "outputs/ablation/vit_gcn_4nb_l1"
SEED: 42
