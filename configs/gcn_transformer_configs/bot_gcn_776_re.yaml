# BoT-GCN Configuration for VeRi-776 with Random Erasing
# CNN + GCN + Graph Pooling + Embedding Fusion + Random Erasing
# Ablation Study: Effect of Random Erasing on Occlusion Robustness

# Data Configuration
DATA:
  ROOT: "data/dataset/776_DataSet"
  BATCH_SIZE: 64  # P * K = 16 * 4 = 64
  NUM_WORKERS: 24
  
  # PK Sampler for Triplet Loss
  USE_PK_SAMPLER: true
  P: 16  # Number of identities per batch
  K: 4   # Number of instances per identity
  
  # Data Augmentation
  AUGMENTATION:
    TYPE: "random_erasing"
    PROBABILITY: 0.5
    PARAMS:
      sl: 0.02          # 最小擦除面积比例 (2%)
      sh: 0.4           # 最大擦除面积比例 (40%)
      r1: 0.3           # 最小宽高比
      r2: 3.33          # 最大宽高比 (1/0.3)
      mode: "random"    # 填充模式: 'random' 随机像素, 'pixel' 均值, 'black' 黑色

# Model Configuration
MODEL:
  NAME: "BoTGCN"
  BACKBONE: "resnet50_ibn_a"
  PRETRAINED: true
  PRETRAINED_PATH: "outputs/bot_baseline_1_1/776/baseline_run_01/best_model.pth"  # VeRi-776 baseline预训练
  NUM_CLASSES: 576  # VeRi-776 training identities
  FEATURE_DIM: 2048
  LAST_STRIDE: 1
  
  # GCN Configuration
  USE_GCN: true
  GRID_H: 4
  GRID_W: 4
  GCN_HIDDEN_DIM: 512
  GCN_NUM_LAYERS: 1
  GCN_DROPOUT: 0.5
  
  # Graph Pooling Configuration
  POOLING_TYPE: "mean"  # 'mean', 'max', 'attention'
  POOLING_HIDDEN_DIM: 128  # for attention pooling
  
  # Embedding Fusion Configuration
  FUSION_TYPE: "concat"  # 'concat', 'gated', 'add', 'none'
  FUSION_HIDDEN_DIM: 512  # for gated fusion
  FUSION_DROPOUT: 0.5
  
  # BNNeck
  NECK: "bnneck"

# Optimizer Configuration
OPTIMIZER:
  NAME: "AdamW"
  BASE_LR: 0.00035
  WEIGHT_DECAY: 0.0005
  EPS: !!float 1e-8

# Scheduler Configuration
SCHEDULER:
  NAME: "WarmupCosineAnnealingLR"
  WARMUP_EPOCHS: 10
  
# Loss Configuration
LOSS:
  LABEL_SMOOTH: 0.1
  TRIPLET_MARGIN: 0.3
  ID_LOSS_WEIGHT: 1.0
  TRIPLET_LOSS_WEIGHT: 1.0

# Training Configuration
EPOCHS: 120
EVAL_PERIOD: 10
LOG_PERIOD: 50

# AMP (Automatic Mixed Precision)
# Note: Disabled because sparse matrix ops in GCN don't support FP16
USE_AMP: false

# Output Configuration
OUTPUT_DIR: "outputs/bot_gcn_776_Random"
SEED: 42

# Experimental Hypothesis:
# Random Erasing在训练时模拟遮挡,预期提升模型对测试时真实遮挡的鲁棒性
# 
# Expected Improvements:
# - Clean (0%): Maintain ~78% mAP (may slightly decrease due to harder training)
# - Light Occlusion (10-20%): +3-5% mAP improvement
# - Heavy Occlusion (30%): +5-10% mAP improvement
# - Grid Occlusion: +5-15% mAP improvement (most significant)
#
# Comparison:
# - Baseline (no RE): outputs/bot_baseline_1_1/776/baseline_run_01/
# - GCN (no RE): outputs/bot_gcn_776_v2/
# - GCN + RE: outputs/bot_gcn_776_Random/ (this config)
