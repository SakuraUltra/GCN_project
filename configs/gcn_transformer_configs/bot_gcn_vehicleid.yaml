# BoT-GCN Configuration for VehicleID
# CNN + GCN + Graph Pooling + Embedding Fusion

# Data Configuration
DATA:
  ROOT: "data/dataset/VehicleID_V1.0"
  BATCH_SIZE: 64
  NUM_WORKERS: 24
  
  # PK Sampler
  USE_PK_SAMPLER: true
  P: 16
  K: 4
  
  # VehicleID specific
  TEST_SIZE: "small"  # 'small' (800), 'medium' (1600), 'large' (2400)

# Model Configuration
MODEL:
  NAME: "BoTGCN"
  BACKBONE: "resnet50_ibn_a"
  PRETRAINED: true
  PRETRAINED_PATH: "outputs/bot_baseline_1_1/VehicleID/baseline_run_01/best_model.pth"  # VehicleID baseline预训练
  NUM_CLASSES: 13164  # VehicleID training identities
  FEATURE_DIM: 2048
  LAST_STRIDE: 1
  
  # GCN Configuration
  USE_GCN: true
  GRID_H: 4
  GRID_W: 4
  GCN_HIDDEN_DIM: 512
  GCN_NUM_LAYERS: 1
  GCN_DROPOUT: 0.5
  
  # Graph Pooling Configuration
  POOLING_TYPE: "mean"
  POOLING_HIDDEN_DIM: 128
  
  # Embedding Fusion Configuration
  FUSION_TYPE: "concat"
  FUSION_HIDDEN_DIM: 512
  FUSION_DROPOUT: 0.5
  
  # BNNeck
  NECK: "bnneck"

# Optimizer Configuration
OPTIMIZER:
  NAME: "AdamW"
  BASE_LR: 0.00035
  WEIGHT_DECAY: 0.0005
  EPS: !!float 1e-8

# Scheduler Configuration
SCHEDULER:
  NAME: "WarmupCosineAnnealingLR"
  WARMUP_EPOCHS: 10
  
# Loss Configuration
LOSS:
  LABEL_SMOOTH: 0.1
  TRIPLET_MARGIN: 0.3
  ID_LOSS_WEIGHT: 1.0
  TRIPLET_LOSS_WEIGHT: 1.0

# Training Configuration
EPOCHS: 120
EVAL_PERIOD: 10
LOG_PERIOD: 100  # VehicleID has more data

# AMP
USE_AMP: true

# Output Configuration
OUTPUT_DIR: "outputs/bot_gcn_vehicleid"
SEED: 42
