# ============================================================
# ViT-GAT 配置文件 (对应任务卡 VIT-26)
# 基于 bot_vitbase_gcn_776.yaml 修改，使用 GAT 替换 GCN
# ============================================================

# Data Configuration
DATA:
  ROOT: "data/dataset/776_DataSet"
  BATCH_SIZE: 64  # P * K = 16 * 4 = 64
  NUM_WORKERS: 24
  
  # PK Sampler for Triplet Loss
  USE_PK_SAMPLER: true
  P: 16  # Number of identities per batch
  K: 4   # Number of instances per identity

# Model Configuration
MODEL:
  NAME: "BotGCN"

  # ── Backbone（唯一改动点）──────────────────────────────
  BACKBONE:
    TYPE: "vit"                                 # 原来是 "resnet_ibn"
    NAME: "vit_base_patch16_224.augreg_in21k_ft_in1k"  # ViT-Base/21k model
    PRETRAINED: true
    OUT_CHANNELS: 2048                          # 投影后维度，对齐 GCN
    TARGET_SPATIAL: 8                           # 对齐原 ResNet 的 8×8

  # ── GCN（改为 GAT）────────────────────────────────────
  GCN:
    USE_GCN: true
    GNN_TYPE: "gat"                             # gat / gcn
    GRID_H: 4
    GRID_W: 4
    IN_CHANNELS: 2048
    HIDDEN_CHANNELS: 512
    OUT_CHANNELS: 2048
    NUM_LAYERS: 1
    HEADS: 2                                    # GAT 多头注意力数量
    DROPOUT: 0.5
    POOLING_TYPE: "mean"                        # mean / max / attention

  # ── 融合（新增 cls_fusion，原 embedding_fusion 不变）──
  FUSION:
    TYPE: "concat"                              # embedding_fusion 保持不变
    CLS_FUSION: true                            # 启用 CLS token 融合层
    OUT_DIM: 2048

  # ── 分类头（不变）──────────────────────────────────────
  NUM_CLASSES: 576                              # VeRi-776 training identities

  # BNNeck
  NECK: "bnneck"

# Input Configuration
INPUT:
  # ViT 标准输入尺寸（原 CNN 用 256×256，ViT 用 224×224）
  SIZE_TRAIN: [224, 224]
  SIZE_TEST: [224, 224]
  PIXEL_MEAN: [0.485, 0.456, 0.406]
  PIXEL_STD: [0.229, 0.224, 0.225]

# Dataloader Configuration
DATALOADER:
  SAMPLER: "pk"
  NUM_INSTANCE: 4                              # K
  BATCH_SIZE: 64                               # P×K = 16×4

# Optimizer Configuration
OPTIMIZER:
  NAME: "AdamW"
  # ViT 微调建议用更小学习率
  BASE_LR: 0.000035                            # 原 CNN 版本约 3.5e-4，缩小10倍
  WEIGHT_DECAY: 0.0005
  EPS: !!float 1e-8

  # ViT backbone 与新增层分组学习率
  LR_GROUPS:
    vit_backbone: 1.0                          # backbone lr = BASE_LR × 1.0
    patch_proj: 10.0                           # 新增投影层 lr × 10（更快收敛）
    cls_proj: 10.0
    cls_fusion: 10.0
    gcn: 10.0                                  # GCN 层同样放大

# Scheduler Configuration
SCHEDULER:
  NAME: "WarmupCosineAnnealingLR"
  WARMUP_ITERS: 500
  WARMUP_EPOCHS: 10
  
# Loss Configuration
LOSS:
  LABEL_SMOOTH: 0.1
  TRIPLET_MARGIN: 0.3
  ID_LOSS_WEIGHT: 1.0
  TRIPLET_LOSS_WEIGHT: 1.0

# Augmentation Configuration
AUGMENTATION:
  RANDOM_ERASING: true
  RANDOM_ERASING_PROB: 0.5

# Training Configuration
EPOCHS: 120
MAX_EPOCHS: 120
EVAL_PERIOD: 10                              # 每10epoch评测一次
LOG_PERIOD: 50

# Test Configuration
TEST:
  DATASET: "veri776"
  EVAL_PERIOD: 10

# AMP (Automatic Mixed Precision)
# Note: Disabled because sparse matrix ops in GCN don't support FP16
USE_AMP: false

# Output Configuration
OUTPUT_DIR: "outputs/bot_vitbase_gat_776"
SEED: 42

# 备注:
# 1. ViT 特征维度 (768) 通过投影层变为 2048，与 ResNet 对齐
# 2. ViT 输出分辨率 14×14 通过自适应池化变为 4×4
# 3. CLS token 替代 GAP 作为全局特征
# 4. 新增 cls_fusion 层将 CLS token 与 GAT 输出二次融合
# 5. GAT 使用 2 个注意力头，参数量约 16.78M（GCN 为 4.20M）
# 6. 分组学习率：backbone 用较小 lr，新增层用较大 lr

