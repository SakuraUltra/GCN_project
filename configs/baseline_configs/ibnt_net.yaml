# IBN-Net Baseline Configuration
model:
  name: "ibnt_net"
  backbone: "resnet50_ibn_a"
  pretrained: true
  num_classes: 576  # VeRi-776 training identities
  feature_dim: 2048
  neck: "bnneck"
  
data:
  dataset: "veri776"
  batch_size: 64
  num_workers: 4
  pin_memory: true
  transforms:
    - "random_horizontal_flip"
    - "random_erasing"
    - "color_jitter"

training:
  epochs: 120
  lr: 0.00035
  weight_decay: 0.0005
  scheduler: "warmup_cosine"
  warmup_epochs: 10
  center_loss_weight: 0.0005
  
loss:
  triplet_margin: 0.3
  label_smooth: 0.1
  center_loss: true

evaluation:
  eval_step: 10
  test_batch_size: 128
  max_rank: 50
  rerank: false