DATA:
  ROOT: data/dataset/VehicleID_V1.0
  BATCH_SIZE: 64
  NUM_WORKERS: 16
  USE_PK_SAMPLER: true
  P: 16
  K: 4
  TEST_SIZE: small
  TRAIN_SIZE: 224
  TEST_INPUT_SIZE: 224
  AUGMENTATION:
    TYPE: random_erasing
    PROBABILITY: 0.5
    PARAMS:
      sl: 0.02
      sh: 0.2
      r1: 0.3
      r2: 3.33
      mode: random
  INPUT_SIZE: 224
INPUT:
  SIZE_TRAIN: [224, 224]
  SIZE_TEST: [224, 224]
  PIXEL_MEAN: [0.485, 0.456, 0.406]
  PIXEL_STD: [0.229, 0.224, 0.225]
MODEL:
  NAME: BoTGCN
  BACKBONE:
    NAME: vit_base_patch16_224  # 明确指定ViT-Base模型（不是small！）
    PRETRAINED: true
    NATIVE_DIM: false
    OUT_CHANNELS: 2048
  PRETRAINED: true
  NUM_CLASSES: 13164
  FEATURE_DIM: 768
  LAST_STRIDE: 1
  GCN:
    USE_GCN: false
    GRID_H: 4
    GRID_W: 4
    ADJACENCY_TYPE: '4'
    HIDDEN_CHANNELS: 512
    OUT_CHANNELS: null
    NUM_LAYERS: 1
    DROPOUT: 0.5
    KNN_K: 8
    KNN_METRIC: cosine
    KNN_DETACH: true
    GNN_TYPE: gcn
    POOLING_TYPE: mean
    POOLING_HIDDEN_DIM: 128
  FUSION:
    TYPE: concat
    HIDDEN_DIM: 512
    DROPOUT: 0.5
OPTIMIZER:
  NAME: AdamW
  BASE_LR: 3.5e-05
  WEIGHT_DECAY: 0.0001
  EPS: 1.0e-08
SCHEDULER:
  NAME: WarmupCosineAnnealingLR
  WARMUP_EPOCHS: 10
LOSS:
  LABEL_SMOOTH: 0.1
  TRIPLET_MARGIN: 0.3
  ID_LOSS_WEIGHT: 1.0
  TRIPLET_LOSS_WEIGHT: 1.0
EPOCHS: 999
EVAL_PERIOD: 10
LOG_PERIOD: 100
AUGMENTATION:
  RANDOM_ERASING: true
  RANDOM_ERASING_PROB: 0.5
USE_AMP: false
EARLY_STOPPING:
  PATIENCE: 50
  MIN_DELTA: 0.002
OUTPUT:
  DIR: outputs/bot_baseline_1_1/VehicleID/vit_baseline_run_01
SEED: 42
